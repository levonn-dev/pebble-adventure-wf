name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: levonn-dev/setup-pebble@v1.0.1
        id: pebble
        with:
          build: 'true'
          sdk-version: '4.9.169'
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" "${{ steps.pebble.outputs.pbw-path }}" --generate-notes
